apiVersion: v1
kind: Service
metadata:
  name: god-mode-orchestrator
  labels:
    app: god-mode-orchestrator
    version: v1.0.0
spec:
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: 8003
    name: http
    protocol: TCP
  - port: 9091
    targetPort: 9091
    name: metrics
    protocol: TCP
  selector:
    app: god-mode-orchestrator
