apiVersion: v1
kind: ServiceAccount
metadata:
  name: god-mode-sa
  labels:
    app: god-mode-orchestrator
  annotations:
    description: "Service account for GodMode Quant Orchestrator"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: god-mode-role
  labels:
    app: god-mode-orchestrator
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: god-mode-rolebinding
  labels:
    app: god-mode-orchestrator
subjects:
- kind: ServiceAccount
  name: god-mode-sa
roleRef:
  kind: Role
  name: god-mode-role
  apiGroup: rbac.authorization.k8s.io
